name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "chore/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tool
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint (critical rules)
        run: |
          ruff check app locustfile.py --select F,E9

      - name: Compose config check
        run: |
          docker compose config

      - name: Build app image
        run: |
          docker build -t local-cdn-lab-media-api-ci -f Dockerfile .
