services:
  # -------- PostgreSQL --------
  db:
    image: postgres:16-alpine
    container_name: cdn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mediadb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mediadb"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  # -------- FastAPI Media App (3 replicas) --------
  media-api:
    build: .
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mediadb
      DB_USER: admin
      DB_PASS: secret
    expose:
      - "8000"
    deploy:
      replicas: 3
    depends_on:
      db:
        condition: service_healthy

  # -------- Nginx Load Balancer --------
  nginx:
    image: nginx:1.27-alpine
    container_name: cdn-nginx
    restart: unless-stopped
    ports:
      - "9080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - media-api

  # ======== PHASE 3: OBSERVABILITY ========

  # -------- Nginx Prometheus Exporter --------
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4
    container_name: cdn-nginx-exporter
    restart: unless-stopped
    command: ["--nginx.scrape-uri=http://nginx:80/stub_status"]
    expose:
      - "9113"
    depends_on:
      - nginx

  # -------- Prometheus --------
  prometheus:
    image: prom/prometheus:v3.2.0
    container_name: cdn-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    depends_on:
      - media-api
      - nginx-exporter

  # -------- Grafana --------
  grafana:
    image: grafana/grafana:11.5.2
    container_name: cdn-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"          # homelab — không cần login
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"         # full quyền cho anonymous user
      GF_SECURITY_ADMIN_PASSWORD: "admin"         # fallback nếu tắt anonymous
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pg_data:
  prom_data:
  grafana_data:

