services:
  # -------- PostgreSQL --------
  db:
    image: postgres:16-alpine
    container_name: cdn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mediadb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mediadb"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  # -------- FastAPI Media App (3 replicas) --------
  media-api:
    build: .
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mediadb
      DB_USER: admin
      DB_PASS: secret
    expose:
      - "8000"
    deploy:
      replicas: 3
    depends_on:
      db:
        condition: service_healthy

  # -------- Nginx Load Balancer --------
  nginx:
    image: nginx:1.27-alpine
    container_name: cdn-nginx
    restart: unless-stopped
    ports:
      - "9080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - media-api

volumes:
  pg_data:
