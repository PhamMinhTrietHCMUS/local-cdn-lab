upstream media_backend {
    # Round-robin (mặc định) — Nginx sẽ luân phiên gửi request tới từng server
    server media-api:8000;
}

server {
    listen 80;

    location / {
        proxy_pass http://media_backend;

        # Truyền thông tin client thật về phía backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Endpoint kiểm tra Nginx hoạt động
    location /nginx-health {
        access_log off;
        return 200 '{"status":"healthy","service":"nginx"}';
        add_header Content-Type application/json;
    }
}
