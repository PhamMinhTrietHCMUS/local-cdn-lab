# Docker DNS resolver — buộc Nginx phân giải lại tên service định kỳ
resolver 127.0.0.11 valid=5s;

server {
    listen 80;

    location / {
        # Dùng biến để Nginx phân giải DNS MỖI REQUEST thay vì chỉ 1 lần
        set $backend http://media-api:8000;
        proxy_pass $backend;

        # Truyền thông tin client thật về phía backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Endpoint kiểm tra Nginx hoạt động
    location /nginx-health {
        access_log off;
        return 200 '{"status":"healthy","service":"nginx"}';
        add_header Content-Type application/json;
    }
}
